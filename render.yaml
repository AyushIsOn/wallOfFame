# Render blueprint: one Node web service (serves the wall + admin + API) and a
# managed PostgreSQL database. Deploy via Render -> "New" -> "Blueprint".
services:
  - type: web
    name: wall-of-fame
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Set this in the Render dashboard (do not commit a real password).
      - key: ADMIN_PASSWORD
        sync: false
      # Render generates a strong secret for signing admin tokens.
      - key: TOKEN_SECRET
        generateValue: true
      # Wired automatically from the database below.
      - key: DATABASE_URL
        fromDatabase:
          name: wall-of-fame-db
          property: connectionString
      # Optional: your n8n webhook for tag generation (leave blank to use the
      # built-in keyword fallback).
      - key: N8N_TAGS_WEBHOOK_URL
        sync: false

databases:
  - name: wall-of-fame-db
    plan: free
