# Render blueprint: one Node web service that serves the wall + admin + API.
#
# NOTE: Render's free tier allows only ONE free PostgreSQL database per account.
# To avoid the "cannot have more than one active free tier database" error,
# this blueprint does NOT auto-create a database. Create (or reuse) a Postgres
# in the Render dashboard and set DATABASE_URL to its Internal Database URL
# (see DEPLOY.md).
services:
  - type: web
    name: wall-of-fame
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Postgres connection string (Render Postgres -> "Internal Database URL").
      - key: DATABASE_URL
        sync: false
      # Admin login password — set in the dashboard.
      - key: ADMIN_PASSWORD
        sync: false
      # Auto-generated secret for signing admin tokens.
      - key: TOKEN_SECRET
        generateValue: true
      # Optional: your n8n webhook for tag generation.
      - key: N8N_TAGS_WEBHOOK_URL
        sync: false
